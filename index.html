<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defect Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">🐞</span>
      <div>
        <h1>Defect Tracker</h1>
        <p class="tagline">Track, triage and resolve software defects</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="theme-toggle" class="btn btn-ghost" title="Toggle theme" aria-label="Toggle theme">🌙</button>
      <button id="export-btn" class="btn btn-ghost">Export</button>
      <button id="import-btn" class="btn btn-ghost">Import</button>
      <input id="import-file" type="file" accept="application/json" hidden />
      <button id="new-defect-btn" class="btn btn-primary">+ New Defect</button>
    </div>
  </header>

  <!-- Stats dashboard -->
  <section class="stats" id="stats" aria-label="Summary statistics"></section>

  <!-- Toolbar: search + filters -->
  <section class="toolbar">
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search title, description, component, assignee…" autocomplete="off" />
    </div>
    <div class="filters">
      <select id="filter-status" aria-label="Filter by status">
        <option value="">All statuses</option>
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
        <option value="Closed">Closed</option>
      </select>
      <select id="filter-severity" aria-label="Filter by severity">
        <option value="">All severities</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select id="filter-assignee" aria-label="Filter by assignee">
        <option value="">All assignees</option>
      </select>
      <select id="sort" aria-label="Sort by">
        <option value="updated-desc">Newest updated</option>
        <option value="created-desc">Newest created</option>
        <option value="created-asc">Oldest created</option>
        <option value="severity-desc">Severity (high → low)</option>
        <option value="priority-desc">Priority (high → low)</option>
        <option value="title-asc">Title (A → Z)</option>
      </select>
      <div class="view-toggle" role="group" aria-label="View mode">
        <button id="view-board" class="view-btn active" title="Board view">▦</button>
        <button id="view-table" class="view-btn" title="Table view">☰</button>
      </div>
    </div>
  </section>

  <main id="content" class="content"></main>

  <!-- Defect editor dialog -->
  <div id="dialog-backdrop" class="dialog-backdrop" hidden>
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
      <div class="dialog-head">
        <h2 id="dialog-title">New Defect</h2>
        <button id="dialog-close" class="btn btn-ghost" aria-label="Close">✕</button>
      </div>
      <form id="defect-form" class="dialog-body">
        <input type="hidden" id="f-id" />
        <label class="field field-full">
          <span>Title <em>*</em></span>
          <input id="f-title" type="text" required maxlength="140" placeholder="Short summary of the defect" />
        </label>
        <label class="field field-full">
          <span>Description</span>
          <textarea id="f-description" rows="4" placeholder="Steps to reproduce, expected vs. actual behaviour…"></textarea>
        </label>
        <label class="field">
          <span>Status</span>
          <select id="f-status">
            <option>Open</option>
            <option>In Progress</option>
            <option>Resolved</option>
            <option>Closed</option>
          </select>
        </label>
        <label class="field">
          <span>Severity</span>
          <select id="f-severity">
            <option>Critical</option>
            <option>High</option>
            <option selected>Medium</option>
            <option>Low</option>
          </select>
        </label>
        <label class="field">
          <span>Priority</span>
          <select id="f-priority">
            <option>P0</option>
            <option>P1</option>
            <option selected>P2</option>
            <option>P3</option>
          </select>
        </label>
        <label class="field">
          <span>Component</span>
          <input id="f-component" type="text" list="component-list" placeholder="e.g. Auth, API, UI" />
          <datalist id="component-list"></datalist>
        </label>
        <label class="field">
          <span>Assignee</span>
          <input id="f-assignee" type="text" list="assignee-list" placeholder="Who owns this?" />
          <datalist id="assignee-list"></datalist>
        </label>
        <label class="field">
          <span>Reporter</span>
          <input id="f-reporter" type="text" placeholder="Who found it?" />
        </label>
        <div class="dialog-actions field-full">
          <button type="button" id="delete-btn" class="btn btn-danger" hidden>Delete</button>
          <div class="spacer"></div>
          <button type="button" id="cancel-btn" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Defect</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="js/seed.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
