<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VM Building Society — Branch Defects Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="shell">
    <div class="app">
      <!-- App bar -->
      <div class="appbar">
        <svg height="26" viewBox="0 0 500 340" fill="none" style="display:block;flex-shrink:0">
          <path d="M14 130 L48 74 L112 280 L213 76 L272 204 L341 76 L446 280 L486 216"
            stroke="#E4012B" stroke-width="42" stroke-linejoin="miter" stroke-miterlimit="3" />
        </svg>
        <div style="flex:1;min-width:0">
          <div class="brand">VM Building Society</div>
          <div class="sub" style="font-weight:500" id="appbar-sub">Branch Defects · Consolidated Register</div>
        </div>
        <span class="srcbadge live" id="src-badge">Built-in data</span>
        <button class="lockbtn" id="export-btn" title="Export current view (CSV)" aria-label="Export CSV">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
          </svg>
        </button>
      </div>

      <!-- Mode toggle: Branch Defects / Operational Standard -->
      <div style="padding:2px 16px 8px">
        <div class="toggle" id="mode-toggle">
          <button data-mode="defects" class="on">Branch Defects</button>
          <button data-mode="opstd">Operational Standard</button>
        </div>
      </div>

      <!-- Screen content -->
      <div class="content" id="content"></div>

      <!-- Bottom tab bar -->
      <div class="tabbar" id="tabbar"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/opstd.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
